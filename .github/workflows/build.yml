name: Build and Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.0.0-beta, v1.0.0-rc1, etc.

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64, arm, 386]
        exclude:
          - goos: darwin
            goarch: arm
          - goos: darwin
            goarch: 386
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Get version from git tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        shell: bash

      - name: Determine release type
        id: release-type
        run: |
          TAG_NAME="${{ steps.version.outputs.tag_name }}"
          if [[ "$TAG_NAME" =~ -beta|-rc|-alpha|pre|dev ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "promote=false" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "promote=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build and zip
        run: make build VERSION=${{ env.VERSION }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload Release Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          tag: ${{ steps.version.outputs.tag_name }}
          release_name: Release ${{ env.VERSION }}
          overwrite: true
          file_glob: true
          prerelease: ${{ steps.release-type.outputs.prerelease }}
          promote: ${{ steps.release-type.outputs.promote }}